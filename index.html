<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Interativo</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">

<style>
  :root{
    --tinta:        #2b2018;
    --pergaminho:   #efe2c8;
    --pergaminho-2: #e3d2af;
    --ouro:         #b08542;
    --ouro-claro:   #d9b06b;
    --vinho:        #7a2e26;
    --borda:        #5a4326;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }

  body{
    font-family:'EB Garamond', Georgia, serif;
    background:#9edafc;           /* branco — sem recorte visível */
    color:var(--tinta);
    overflow:hidden;
  }

  #map{
    position:absolute; inset:0;
    background:#9edafc;
    cursor:grab;
  }
  #map:active{ cursor:grabbing; }

  .leaflet-container{ background:#9edafc; outline:none; }

  /* ---- HAMBURGUER (só aparece no mobile) ---- */
  #hamburguer{
    display:none;
    position:absolute; top:14px; left:14px; z-index:700;
    width:40px; height:40px; cursor:pointer;
    background:rgba(255,255,255,.92);
    border:1px solid var(--borda); border-radius:6px;
    flex-direction:column; align-items:center; justify-content:center; gap:5px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
  }
  #hamburguer span{
    display:block; width:20px; height:2px;
    background:var(--tinta); border-radius:2px; transition:.2s;
  }
  #hamburguer.aberto span:nth-child(1){ transform:translateY(7px) rotate(45deg); }
  #hamburguer.aberto span:nth-child(2){ opacity:0; }
  #hamburguer.aberto span:nth-child(3){ transform:translateY(-7px) rotate(-45deg); }

  /* ---- PAINEL ---- */
  .hud{
    position:absolute; top:18px; left:18px; z-index:600;
    width:260px; max-width:calc(100vw - 36px);
    background:linear-gradient(180deg, var(--pergaminho), var(--pergaminho-2));
    border:1px solid var(--borda); border-radius:6px;
    box-shadow:0 10px 30px rgba(0,0,0,.25), inset 0 0 0 4px rgba(176,133,66,.18);
    padding:16px 16px 14px;
    transition:opacity .2s, transform .2s;
  }
  .hud h1{
    font-family:'Cinzel',serif; font-weight:700;
    font-size:20px; letter-spacing:.5px; color:var(--tinta);
    line-height:1.1; margin-bottom:2px;
  }
  .hud .sub{
    font-style:italic; font-size:13px; color:#6b5942;
    border-bottom:1px solid rgba(90,67,38,.3);
    padding-bottom:10px; margin-bottom:10px;
  }

  /* lista de lugares */
  .lugares{ max-height:38vh; overflow:auto; margin:-2px -4px 12px; padding:0 4px; }
  .lugares::-webkit-scrollbar{ width:4px; }
  .lugares::-webkit-scrollbar-thumb{ background:var(--ouro); border-radius:2px; }
  .lugares button{
    display:block; width:100%; text-align:left;
    background:none; border:none; cursor:pointer;
    font-family:'EB Garamond',serif; font-size:14.5px; color:var(--tinta);
    padding:5px 8px; border-radius:4px;
  }
  .lugares button:hover{ background:rgba(176,133,66,.22); }
  .lugares button::before{ content:"➜ "; color:var(--ouro); }

  /* botão localizador */
  .coord-btn{
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; cursor:pointer;
    font-family:'Cinzel',serif; font-size:11px; letter-spacing:.5px;
    text-transform:uppercase;
    background:var(--tinta); color:var(--pergaminho);
    border:1px solid var(--borda); border-radius:4px;
    padding:9px; transition:.15s;
  }
  .coord-btn:hover{ background:#3a2c1f; }
  .coord-btn.ativo{ background:var(--vinho); }

  /* leitura de coordenadas */
  #leitura{
    position:absolute; bottom:18px; left:50%; transform:translateX(-50%);
    z-index:600; display:none;
    background:var(--tinta); color:var(--pergaminho);
    font-family:'Cinzel',serif; font-size:14px; letter-spacing:.5px;
    padding:10px 18px; border-radius:5px; border:1px solid var(--ouro);
    box-shadow:0 8px 24px rgba(0,0,0,.4);
    white-space:nowrap;
  }
  #leitura b{ color:var(--ouro-claro); }
  #leitura small{ display:block; font-family:'EB Garamond',serif; letter-spacing:0; opacity:.7; font-size:12px; margin-top:3px; }

  /* ---- PINOS ---- */
  .pino{
    width:14px; height:14px; border-radius:50%;
    background:var(--ouro);
    border:2px solid rgba(0,0,0,.5);
    box-shadow:0 2px 6px rgba(0,0,0,.6);
    transition:.12s;
  }
  .pino:hover{ transform:scale(1.4); }

  /* ---- POPUP ---- */
  .leaflet-popup-content-wrapper{
    background:linear-gradient(180deg,var(--pergaminho),var(--pergaminho-2));
    color:var(--tinta); border:1px solid var(--borda); border-radius:5px;
    box-shadow:0 8px 24px rgba(0,0,0,.35);
  }
  .leaflet-popup-tip{ background:var(--pergaminho-2); border:1px solid var(--borda); }
  .leaflet-popup-content{ margin:12px 16px; font-size:15px; line-height:1.4; }
  .leaflet-popup-content h3{
    font-family:'Cinzel',serif; font-size:16px;
    letter-spacing:.3px; margin:0;
  }
  .leaflet-container a.leaflet-popup-close-button{ color:var(--borda); }

  /* controles de zoom */
  .leaflet-control-zoom a{
    background:rgba(255,255,255,.9); color:var(--tinta);
    border:1px solid var(--borda)!important;
    font-family:'Cinzel',serif;
  }
  .leaflet-control-zoom a:hover{ background:var(--ouro-claro); }
  .leaflet-control-attribution{ background:rgba(255,255,255,.75)!important; font-size:10px; }

  /* ---- MOBILE ---- */
  @media (max-width: 640px){
    #hamburguer{ display:flex; }
    .hud{
      top:64px; left:14px;
      width:calc(100vw - 28px);
      display:none;
    }
    .hud.visivel{ display:block; }
  }
</style>
</head>
<body>

<div id="map"></div>

<!-- hamburguer (mobile) -->
<div id="hamburguer" onclick="toggleHud()">
  <span></span><span></span><span></span>
</div>

<div class="hud" id="hud">
  <h1 id="titulo">Meu Mundo</h1>
  <div class="sub" id="subtitulo">um atlas das terras conhecidas</div>
  <div class="lugares" id="lugares"></div>
  <button class="coord-btn" id="coordBtn">📍 Encontrar coordenadas</button>
</div>

<div id="leitura"></div>

<script>
/* ============================================================
   ⬇️  PERSONALIZE AQUI  ⬇️
   ============================================================ */

const TITULO    = "Meu Mundo";
const SUBTITULO = "um atlas das terras conhecidas";

// Caminho/URL da sua imagem (já no GitHub, só atualizar)
const IMAGEM = "map.png";

// Tamanho real da imagem em pixels
const LARGURA = 1142;
const ALTURA  = 2048;

// Pinos — coordenadas estimadas do mapa (use "Encontrar coordenadas" pra ajustar)
const PINOS = [
  { x:510, y:619, titulo:"Rookery Castle"    },
  { x:900, y:821, titulo:"Rosegarden"        },
  { x: 428, y: 1052, titulo:"Highclaw"       },
  { x:649, y:1134, titulo:"Woodden"          },
  { x:939, y:1118, titulo:"Squidstone"       },
  { x:477, y:1285, titulo:"Lion's Domain"    },
  { x:610, y:1302, titulo:"Reedfort"         },
  { x:696, y:1381, titulo:"Cliffridge"       },
  { x:313, y:1479, titulo:"Thundergorge"     },
  { x:823, y:1609, titulo:"Gryffrock"        },
  {  x:573, y:1912, titulo:"Sunstone"        },
];

/* ============================================================
   ⬆️  FIM DA PERSONALIZAÇÃO
   ============================================================ */

document.getElementById("titulo").textContent    = TITULO;
document.getElementById("subtitulo").textContent = SUBTITULO;

const map = L.map("map", {
  crs: L.CRS.Simple,
  minZoom: -5, maxZoom: 3,
  zoomControl: true,
  attributionControl: true,
  wheelPxPerZoomLevel: 80,
});

const bounds = [[0,0],[ALTURA,LARGURA]];
L.imageOverlay(IMAGEM, bounds).addTo(map);

// Preenche a tela pela altura (mapa vertical)
function zoomVertical(){
  const z = Math.log2(window.innerHeight / ALTURA);
  map.setView([ALTURA/2, LARGURA/2], z, { animate:false });
}
zoomVertical();
window.addEventListener("resize", () => { if(!map._zooming) zoomVertical(); });
map.setMaxBounds([[-ALTURA*.15,-LARGURA*.15],[ALTURA*1.15,LARGURA*1.15]]);

// pixel (x esq, y topo) → latLng Leaflet
function xy(x,y){ return [ALTURA-y, x]; }

// Pinos
const lugaresBox = document.getElementById("lugares");
PINOS.forEach(p => {
  const icon = L.divIcon({
    className:"",
    html:`<div class="pino"></div>`,
    iconSize:[14,14], iconAnchor:[7,7], popupAnchor:[0,-10],
  });
  const m = L.marker(xy(p.x,p.y),{icon}).addTo(map)
    .bindPopup(`<h3>${p.titulo}</h3>`);

  const b = document.createElement("button");
  b.textContent = p.titulo;
  b.onclick = () => {
    map.flyTo(xy(p.x,p.y), 1, {duration:.7});
    m.openPopup();
    // fecha o painel no mobile após clicar
    if(window.innerWidth<=640) fecharHud();
  };
  lugaresBox.appendChild(b);
});

// Localizador de coordenadas
const btn     = document.getElementById("coordBtn");
const leitura = document.getElementById("leitura");
let modoCoord = false;

btn.onclick = () => {
  modoCoord = !modoCoord;
  btn.classList.toggle("ativo", modoCoord);
  btn.textContent = modoCoord ? "✕ Sair do modo coordenadas" : "📍 Encontrar coordenadas";
  leitura.style.display = modoCoord ? "block" : "none";
  if(modoCoord) leitura.innerHTML = "Clique em qualquer ponto do mapa";
  document.getElementById("map").style.cursor = modoCoord ? "crosshair" : "";
};

map.on("click", e => {
  if(!modoCoord) return;
  const x = Math.round(e.latlng.lng);
  const y = Math.round(ALTURA - e.latlng.lat);
  leitura.innerHTML = `x: <b>${x}</b>&nbsp;&nbsp; y: <b>${y}</b>
    <small>{ x:${x}, y:${y}, titulo:"Nome do Local" }</small>`;
  navigator.clipboard?.writeText(`{ x:${x}, y:${y}, titulo:"" },`).catch(()=>{});
});

// Hamburguer mobile
function toggleHud(){
  const hud  = document.getElementById("hud");
  const hamb = document.getElementById("hamburguer");
  const aberto = hud.classList.toggle("visivel");
  hamb.classList.toggle("aberto", aberto);
}
function fecharHud(){
  document.getElementById("hud").classList.remove("visivel");
  document.getElementById("hamburguer").classList.remove("aberto");
}
</script>
</body>
</html>
