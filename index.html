<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Interativo</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

<style>
  :root{
    --tinta:        #2b2018;
    --pergaminho:   #efe2c8;
    --pergaminho-2: #e3d2af;
    --ouro:         #b08542;
    --ouro-claro:   #d9b06b;
    --vinho:        #7a2e26;
    --borda:        #5a4326;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }

  body{
    font-family:'EB Garamond', Georgia, serif;
    background:#9edafc;
    color:var(--tinta);
    overflow:hidden;
  }

  #map{
    position:absolute; inset:0;
    background:#9edafc;
    cursor:grab;
  }
  #map:active{ cursor:grabbing; }
  .leaflet-container{ background:#9edafc; outline:none; }

  /* ---- HAMBURGUER (mobile) ---- */
  #hamburguer{
    display:none;
    position:absolute; top:14px; left:14px; z-index:700;
    width:40px; height:40px; cursor:pointer;
    background:rgba(255,255,255,.92);
    border:1px solid var(--borda); border-radius:6px;
    flex-direction:column; align-items:center; justify-content:center; gap:5px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
  }
  #hamburguer span{
    display:block; width:20px; height:2px;
    background:var(--tinta); border-radius:2px; transition:.2s;
  }
  #hamburguer.aberto span:nth-child(1){ transform:translateY(7px) rotate(45deg); }
  #hamburguer.aberto span:nth-child(2){ opacity:0; }
  #hamburguer.aberto span:nth-child(3){ transform:translateY(-7px) rotate(-45deg); }

  /* ---- PAINEL ---- */
  .hud{
    position:absolute; top:18px; left:18px; z-index:600;
    width:260px; max-width:calc(100vw - 36px);
    background:linear-gradient(180deg, var(--pergaminho), var(--pergaminho-2));
    border:1px solid var(--borda); border-radius:6px;
    box-shadow:0 10px 30px rgba(0,0,0,.25), inset 0 0 0 4px rgba(176,133,66,.18);
    padding:16px 16px 14px;
    transition:opacity .2s, transform .2s;
  }
  .hud h1{
    font-family:'Cinzel',serif; font-weight:700;
    font-size:20px; letter-spacing:.5px; color:var(--tinta);
    line-height:1.1; margin-bottom:2px;
  }
  .hud .sub{
    font-style:italic; font-size:13px; color:#6b5942;
    border-bottom:1px solid rgba(90,67,38,.3);
    padding-bottom:10px; margin-bottom:10px;
  }

  .lugares{ max-height:38vh; overflow:auto; margin:-2px -4px 12px; padding:0 4px; }
  .lugares::-webkit-scrollbar{ width:4px; }
  .lugares::-webkit-scrollbar-thumb{ background:var(--ouro); border-radius:2px; }
  .lugares button{
    display:block; width:100%; text-align:left;
    background:none; border:none; cursor:pointer;
    font-family:'EB Garamond',serif; font-size:14.5px; color:var(--tinta);
    padding:5px 8px; border-radius:4px;
  }
  .lugares button:hover{ background:rgba(176,133,66,.22); }
  .lugares button::before{ content:"➜ "; color:var(--ouro); }

  /* botão localizador */
  .coord-btn{
    display:flex; align-items:center; justify-content:center; gap:7px;
    width:100%; cursor:pointer;
    font-family:'Cinzel',serif; font-size:11px; letter-spacing:.5px;
    text-transform:uppercase;
    background:var(--tinta); color:var(--pergaminho);
    border:1px solid var(--borda); border-radius:4px;
    padding:9px; transition:.15s;
  }
  .coord-btn:hover{ background:#3a2c1f; }
  .coord-btn.ativo{ background:var(--vinho); }
  .coord-btn svg{ width:13px; height:13px; fill:var(--pergaminho); flex:none; }

  /* leitura coordenadas */
  #leitura{
    position:absolute; bottom:18px; left:50%; transform:translateX(-50%);
    z-index:600; display:none;
    background:var(--tinta); color:var(--pergaminho);
    font-family:'Cinzel',serif; font-size:14px; letter-spacing:.5px;
    padding:10px 18px; border-radius:5px; border:1px solid var(--ouro);
    box-shadow:0 8px 24px rgba(0,0,0,.4);
    white-space:nowrap;
  }
  #leitura b{ color:var(--ouro-claro); }
  #leitura small{ display:block; font-family:'EB Garamond',serif; letter-spacing:0; opacity:.7; font-size:12px; margin-top:3px; }

  /* ---- PINOS — ícone de localização SVG ---- */
  .pino-wrap{
    position:relative;
    display:flex; flex-direction:column; align-items:center;
    cursor:pointer;
  }
  .pino-svg{
    width:26px; height:32px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,.55));
    transition: transform .15s, filter .15s;
  }
  .pino-wrap:hover .pino-svg{
    transform: scale(1.25) translateY(-3px);
    filter: drop-shadow(0 4px 7px rgba(0,0,0,.7));
  }
  /* label nome ao hover */
  .pino-label{
    position:absolute; bottom:calc(100% + 4px);
    background:var(--tinta); color:var(--pergaminho);
    font-family:'Cinzel',serif; font-size:11px; letter-spacing:.3px;
    padding:4px 9px; border-radius:3px; border:1px solid var(--ouro);
    white-space:nowrap; pointer-events:none;
    opacity:0; transform:translateY(4px);
    transition: opacity .18s, transform .18s;
    box-shadow:0 3px 10px rgba(0,0,0,.45);
  }
  .pino-wrap:hover .pino-label{
    opacity:1; transform:translateY(0);
  }

  /* ---- POPUP ---- */
  .leaflet-popup-content-wrapper{
    background:linear-gradient(160deg, var(--pergaminho) 0%, var(--pergaminho-2) 100%);
    color:var(--tinta); border:1px solid var(--borda); border-radius:6px;
    box-shadow:0 12px 36px rgba(0,0,0,.5), inset 0 0 0 3px rgba(176,133,66,.13);
    min-width:240px; max-width:320px;
    overflow:hidden;
  }
  .leaflet-popup-tip{ background:var(--pergaminho-2); }

  /* força margin zero que o Leaflet insiste em colocar */
  .leaflet-popup-content{
    margin:0 !important; padding:0 !important;
    font-size:15px; line-height:1.55;
    overflow:hidden; border-radius:5px;
  }

  /* imagem do popup */
  .pop-img-wrap{
    width:100%; overflow:hidden;
    border-radius:5px 5px 0 0;
    line-height:0;
  }
  .pop-img-wrap img{
    width:100%; display:block;
    height:170px;
    object-fit:cover; object-position:center center;
    opacity:0;
    transition: opacity .5s ease;
  }
  .pop-img-wrap img.carregada{ opacity:1; }

  /* conteúdo abaixo da imagem */
  .pop-inner{ padding:14px 18px 16px; }

  .leaflet-popup-content h3{
    font-family:'Cinzel',serif; font-size:17px; font-weight:700;
    color:var(--tinta); margin-bottom:8px;
    border-bottom:1px solid rgba(90,67,38,.3); padding-bottom:6px;
    letter-spacing:.3px;
  }
  .leaflet-popup-content .pop-sub{
    font-family:'Cinzel',serif; font-size:10px; letter-spacing:.7px;
    text-transform:uppercase; color:var(--ouro);
    display:block; margin-bottom:6px;
  }
  .leaflet-popup-content .pop-body{
    font-family:'EB Garamond',serif; font-size:15px;
    line-height:1.6; color:#3a2c1f;
  }
  .leaflet-container a.leaflet-popup-close-button{
    color:var(--borda); font-size:18px; top:9px; right:11px;
  }
  .leaflet-container a.leaflet-popup-close-button:hover{ color:var(--vinho); }

  /* entrada suave do popup */
  .leaflet-popup{ animation: popIn .2s cubic-bezier(.22,.68,0,1.35); }
  @keyframes popIn{
    from{ opacity:0; transform:scale(.9) translateY(6px); }
    to  { opacity:1; transform:scale(1)  translateY(0);   }
  }

  /* ---- ZOOM — canto inferior esquerdo ---- */
  .leaflet-bottom.leaflet-left{ bottom:18px; left:18px; }
  .leaflet-control-zoom{
    border:1px solid var(--borda) !important;
    border-radius:5px !important; overflow:hidden;
    box-shadow:0 4px 14px rgba(0,0,0,.3) !important;
  }
  .leaflet-control-zoom a{
    background:rgba(239,226,200,.95) !important; color:var(--tinta) !important;
    border:none !important; border-bottom:1px solid var(--borda) !important;
    font-family:'Cinzel',serif; font-size:16px;
    width:30px !important; height:30px !important;
    display:flex !important; align-items:center; justify-content:center;
    line-height:1 !important;
  }
  .leaflet-control-zoom-out{ border-bottom:none !important; }
  .leaflet-control-zoom a:hover{ background:var(--ouro-claro) !important; }
  .leaflet-control-attribution{ background:rgba(255,255,255,.7)!important; font-size:10px; }

  /* ---- MOBILE ---- */
  @media (max-width:640px){
    #hamburguer{ display:flex; }
    .hud{ top:64px; left:14px; width:calc(100vw - 28px); display:none; }
    .hud.visivel{ display:block; }
  }
</style>
</head>
<body>

<div id="map"></div>

<div id="hamburguer" onclick="toggleHud()">
  <span></span><span></span><span></span>
</div>

<div class="hud" id="hud">
  <h1 id="titulo">Austanos</h1>
  <div class="sub" id="subtitulo">um atlas das terras conhecidas</div>
  <div class="lugares" id="lugares"></div>
  <button class="coord-btn" id="coordBtn">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/>
    </svg>
    Encontrar coordenadas
  </button>
</div>

<div id="leitura"></div>

<script>
/* ============================================================
   PERSONALIZE AQUI
   ============================================================ */

const TITULO    = "Austanos";
const SUBTITULO = "um atlas das terras conhecidas";
const IMAGEM    = "map.png";
const LARGURA   = 1142;
const ALTURA    = 2048;

const PINOS = [
  {
    x:510, y:619, cor:"#7a2e26",
    titulo:"Rookery Castle",
    subtitulo:"Casa Torlland",
    imagem:"IMAGEM AQUI",   // ex: "rookery.png" — deixe "" para sem imagem
    texto:"A mais antiga das casas, erguida sobre um povo que chegou pelo mar do norte antes de qualquer outro povo chegar ao continente. Nunca foram convertidos à fé dos Rhunos, nunca foram vencidos por força externa. Guardam uma muralha no extremo norte que o resto do continente há muito parou de financiar. A sua fé acredita que o inverno vence no fim e que nem os deuses escapam disso."
  },
  {
    x:900, y:821, cor:"#4a7a2e",
    titulo:"Rosegarden",
    subtitulo:"Casa Farrell",
    imagem:"IMAGEM AQUI",
    texto:"A casa do nordeste fértil, a única das grandes casas que chegou ao poder pela administração e não pelo combate. O fundador era senescal da casa anterior e assumiu o governo quando a linhagem que servia foi destruída numa batalha. Governam pela hospitalidade e pelo casamento mais do que pelo exército. Movem-se devagar em direção ao que querem e raramente declaram abertamente o que é."
  },
  {
    x:428, y:1052, cor:"#7a2e26",
    titulo:"Highclaw",
    subtitulo:"Casa Tukk",
    imagem:"IMAGEM AQUI",
    texto:"A segunda casa mais antiga do continente, senhora das três passagens que cortam as montanhas do oeste. Controlam os únicos acessos viáveis ao Vale Poente, e nenhum exército entrou no Vale sem permissão dos Tukk. Raramente saem do Vale para envolver-se nos conflitos do continente. Consideram essa escolha prudência. As outras casas consideram arrogância."
  },
  {
    x:649, y:1134, cor:"#2f6b6b",
    titulo:"Woodden",
    subtitulo:"Ponto de interesse",
    imagem:"",
    texto:""
  },
  {
    x:939, y:1118, cor:"#2f4a7a",
    titulo:"Squidstone",
    subtitulo:"Casa Ryke",
    imagem:"IMAGEM AQUI",
    texto:"A casa da ponta nordeste, dona da maior frota do continente. Dizem ter chegado ao continente antes de todos os outros povos, vindo do mar oriental e não do oeste como os demais. Os estudiosos não encontraram evidência que confirme essa origem. Os Ryke nunca permitiram que ninguém examinasse os seus registros antigos. Guardam uma fé própria, distinta da que os Rhunos trouxeram ao continente, e casam quase exclusivamente dentro da própria gente."
  },
  {
    x:477, y:1285, cor:"#2f6b6b",
    titulo:"Lion's Domain",
    subtitulo:"Ponto de interesse",
    imagem:"",
    texto:""
  },
  {
    x:610, y:1302, cor:"#7a2e26",
    titulo:"Reedfort",
    subtitulo:"Casa Barriston",
    imagem:"IMAGEM AQUI",
    texto:"A casa do centro, com sede onde os três rios se encontram. Nasceu de uma rebelião contra um senhor considerado injusto pelos seus próprios vassalos. O fundador poupou os filhos do homem que derrubou quando o costume da época era matá-los. São lentos a fazer promessas e conhecidos por cumpri-las quando as fazem. Essa reputação é o principal ativo político da casa."
  },
  {
    x:696, y:1381, cor:"#2f6b6b",
    titulo:"Cliffridge",
    subtitulo:"Ponto de interesse",
    imagem:"",
    texto:""
  },
  {
    x:313, y:1479, cor:"#7a2e26",
    titulo:"Thundergorge",
    subtitulo:"Casa Greyley",
    imagem:"IMAGEM AQUI",
    texto:"A casa da costa sudoeste, com sede sobre o desfiladeiro das tempestades. Fundada pela espada há cerca de quatro séculos, quando o fundador matou o senhor anterior em batalha e desposou a filha dele para dar aparência de direito ao que havia tomado pela força. Resolvem disputas pela força com mais frequência do que pela negociação, e não consideram isso uma fraqueza."
  },
  {
    x:823, y:1609, cor:"#7a2e26",
    titulo:"Gryffrock",
    subtitulo:"Casa Gryff",
    imagem:"IMAGEM AQUI",
    texto:"A casa mais rica do continente, com sede no leste onde estão as principais minas de metal. Preferem negociar a combater, e usaram casamentos e empréstimos para estender influência por quase todas as outras casas ao longo das gerações. As terras que governam têm história mais longa do que a própria casa — os primeiros poços foram abertos por trabalhadores escravizados séculos antes de qualquer Gryff existir."
  },
  {
    x:573, y:1912, cor:"#7a2e26",
    titulo:"Sunstone",
    subtitulo:"Casa Tyran",
    imagem:"IMAGEM AQUI",
    texto:"A casa do extremo sul, região com o clima mais quente do continente. A marca da civilização belta ainda é visível nas leis, nos costumes e na arquitetura do domínio. Governam por leis que reconhecem mulheres como herdeiras, prática que vem daquela herança e que o norte nunca adotou. Quando o continente foi reunido sob autoridade comum, o sul foi o último a aceitar, e aceitou sob condições que preservaram a maior parte da sua autonomia."
  },
];

/* ============================================================
   MOTOR
   ============================================================ */

document.getElementById("titulo").textContent    = TITULO;
document.getElementById("subtitulo").textContent = SUBTITULO;

function svgPin(cor){
  return `<svg class="pino-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"
      fill="${cor}" stroke="rgba(0,0,0,0.4)" stroke-width="0.8"/>
    <circle cx="12" cy="9" r="2.6" fill="rgba(255,255,255,0.85)"/>
  </svg>`;
}

const map = L.map("map", {
  crs: L.CRS.Simple,
  minZoom: -5, maxZoom: 3,
  zoomControl: false,
  attributionControl: true,
  wheelPxPerZoomLevel: 80,
});

// Zoom no canto inferior esquerdo
L.control.zoom({ position:"bottomleft" }).addTo(map);

const bounds = [[0,0],[ALTURA,LARGURA]];
L.imageOverlay(IMAGEM, bounds).addTo(map);

// Trava: não deixa subir além do topo da imagem
map.setMaxBounds([
  [ALTURA * 1.0, -LARGURA * 0.15],   // topo exato
  [-ALTURA * 0.15,  LARGURA * 1.15]
]);

function zoomVertical(){
  const z = Math.log2(window.innerHeight / ALTURA);
  map.setView([ALTURA/2, LARGURA/2], z, { animate:false });
}
zoomVertical();
window.addEventListener("resize", () => { if(!map._zooming) zoomVertical(); });

function xy(x,y){ return [ALTURA-y, x]; }

// Pinos
const lugaresBox = document.getElementById("lugares");
PINOS.forEach(p => {
  const cor = p.cor || "#7a2e26";

  const icon = L.divIcon({
    className:"",
    html:`<div class="pino-wrap">
            ${svgPin(cor)}
            <div class="pino-label">${p.titulo}</div>
          </div>`,
    iconSize:[26,32], iconAnchor:[13,32], popupAnchor:[0,-34],
  });

  const imgHTML = (p.imagem && p.imagem !== "IMAGEM AQUI")
    ? `<div class="pop-img-wrap">
         <img src="${p.imagem}" alt="${p.titulo}"
              onload="this.classList.add('carregada')"
              onerror="this.parentElement.style.display='none'">
       </div>`
    : "";

  const popHTML = `
    ${imgHTML}
    <div class="pop-inner">
      ${p.subtitulo ? `<span class="pop-sub">${p.subtitulo}</span>` : ""}
      <h3>${p.titulo}</h3>
      ${p.texto ? `<div class="pop-body">${p.texto}</div>` : ""}
    </div>`;

  const m = L.marker(xy(p.x,p.y),{icon}).addTo(map)
    .bindPopup(popHTML, { maxWidth:310, closeButton:true });

  const b = document.createElement("button");
  b.textContent = p.titulo;
  b.onclick = () => {
    map.flyTo(xy(p.x,p.y), 1, { duration:.8, easeLinearity:.3 });
    setTimeout(() => m.openPopup(), 550);
    if(window.innerWidth<=640) fecharHud();
  };
  lugaresBox.appendChild(b);
});

// Localizador de coordenadas
const coordBtn = document.getElementById("coordBtn");
const leitura  = document.getElementById("leitura");
let modoCoord  = false;

const iconePin = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/>
</svg>`;

coordBtn.onclick = () => {
  modoCoord = !modoCoord;
  coordBtn.classList.toggle("ativo", modoCoord);
  coordBtn.innerHTML = modoCoord
    ? `${iconePin} Sair do modo coordenadas`
    : `${iconePin} Encontrar coordenadas`;
  leitura.style.display = modoCoord ? "block" : "none";
  if(modoCoord) leitura.innerHTML = "Clique em qualquer ponto do mapa";
  document.getElementById("map").style.cursor = modoCoord ? "crosshair" : "";
};

map.on("click", e => {
  if(!modoCoord) return;
  const x = Math.round(e.latlng.lng);
  const y = Math.round(ALTURA - e.latlng.lat);
  leitura.innerHTML = `x: <b>${x}</b>&emsp;y: <b>${y}</b>
    <small>{ x:${x}, y:${y}, titulo:"Nome do Local" }</small>`;
  navigator.clipboard?.writeText(`{ x:${x}, y:${y}, cor:"#7a2e26", titulo:"", subtitulo:"", texto:"" },`).catch(()=>{});
});

// Hamburguer mobile
function toggleHud(){
  const hud  = document.getElementById("hud");
  const hamb = document.getElementById("hamburguer");
  const aberto = hud.classList.toggle("visivel");
  hamb.classList.toggle("aberto", aberto);
}
function fecharHud(){
  document.getElementById("hud").classList.remove("visivel");
  document.getElementById("hamburguer").classList.remove("aberto");
}
</script>
</body>
</html>
